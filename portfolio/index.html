// ═══ 大盘 ═══
function renderOverview(){
  let h='<div class="idx-bar">';
  D.idx.forEach(i=>{let s=i.change_pct>=0?'up':'down';h+=`<div class="idx-card"><div class="n">${i.name}</div><div class="v ${s}">${fmt(i.price)}</div><div class="c ${s}">${i.change_pct>=0?"+"+fmt(i.change_pct):fmt(i.change_pct)}%</div></div>`});
  h+='</div>';

  let pf=D.pf;
  h+=`<div class="cards">
    <div class="card"><div class="lb">💰 总资产</div><div class="vl">¥${fmt(pf.total_assets)}</div><div class="sb">投入 ¥${fmt(pf.invested)}</div></div>
    <div class="card"><div class="lb">📈 浮动盈亏</div><div class="vl" style="color:${color(pf.pnl)}">¥${fmt(pf.pnl)}</div><div class="sb" style="color:${color(pf.pnl_pct)}">${pf.pnl_pct>=0?'+':''}${fmt(pf.pnl_pct)}%</div></div>

  </div>`;

  // 指数走势
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';

  h+='<div class="chart-box"><h4>💎 糖果池核心</h4><canvas id="chCandy"></canvas></div>';
  h+='<div class="chart-box"><h4>🚀 火箭池核心</h4><canvas id="chRocket"></canvas></div>';
  h+='</div>';

  // 日K图

  Object.entries(D.ih.indices).forEach(([n,d])=>{if(d.daily.length>1){let b=d.daily[0].price;ds.push({label:n,data:d.daily.map(p=>({x:p.date.slice(5),y:((p.price-b)/b*100)})),borderColor:colors[n]||'#888',borderWidth:1.5,pointRadius:0,tension:.3})}});
  if(ds.length)charts.idxD=new Chart($('chIdxD'),{type:'line',data:{datasets:ds},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:10}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>v.toFixed(1)+'%'}}}}});

  if(pf.nav_history.length>1)charts.nav=new Chart($('chNav'),{type:'line',data:{datasets:[{data:pf.nav_history.map(p=>({x:p.date.slice(5),y:p.total_assets})),borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,.1)',fill:true,borderWidth:2,pointRadius:0,tension:.3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:10}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>'¥'+(v/1e4).toFixed(1)+'万'}}}}});

// ═══ 自选 ═══
function renderWatchlist(){
  let h='';
  D.stk.pools.forEach(p=>{
    h+=`<div class="pool"><div class="pool-h"><h3>${p.emoji} ${p.name}</h3><span class="tag">${(p.ratio*100).toFixed(0)}% · ${p.desc}</span></div>`;
    h+='<div style="overflow-x:auto"><table><thead><tr><th>标的</th><th>现价</th><th>涨跌</th><th>开盘</th><th>高</th><th>低</th><th>昨收</th><th>评分</th><th>逻辑</th></tr></thead><tbody>';
    p.stocks.forEach(s=>{
      let sc=s.change_pct>0?'up':s.change_pct<0?'down':'';
      let sc2=s.score>=8?'shi':s.score>=6?'smi':'slo';
      h+=`<tr><td><b>${s.name}</b><br><span style="font-size:10px;color:var(--text2)">${s.code}</span></td><td class="${sc}" style="font-weight:600">${fmt(s.price)}</td><td>${chgT(s.change_pct)}</td><td>${fmt(s.open)}</td><td style="color:var(--green)">${fmt(s.high)}</td><td style="color:var(--red)">${fmt(s.low)}</td><td>${fmt(s.prev_close)}</td><td><span class="score ${sc2}">${s.score}/10</span></td><td style="font-size:11px;color:var(--text2);max-width:200px">${s.reason}</td></tr>`;
    });
    h+='</tbody></table></div></div>';
  });
  $('watchlist').innerHTML=h;
}

      let pnl=(sn.price?sn.price-hd.cost:0)*hd.shares;
      let pnlp=hd.cost?((sn.price||hd.cost)-hd.cost)/hd.cost*100:0;
      h+=`<tr><td><b>${n}</b></td><td>${hd.shares}</td><td>¥${fmt(hd.cost)}</td><td>¥${fmt(sn.price||hd.cost)}</td><td>¥${fmt(mv)}</td><td style="color:${color(pnl)}">¥${fmt(pnl)} (${pnlp>=0?'+':''}${fmt(pnlp)}%)</td></tr>`;
    }
    h+='</tbody></table></div>';
  }else{
    h+='<div class="card" style="text-align:center;padding:40px;color:var(--text2)"><p style="font-size:48px">🏁</p><p>空仓待命 — 明天(5/12)定投日启动建仓</p><p style="font-size:12px;margin-top:8px">首月优先建糖果池：长江电力/中国移动/工商银行</p></div>';
  }
  $('portfolio').innerHTML=h;
}

// ═══ 数据 ═══
function renderData(){
  let h='<div class="mode-bar"><button class="mode-btn active" data-mode="daily">📅 日K视图</button><button class="mode-btn" data-mode="intraday">⏱ 分时视图</button></div>';
  h+='<div class="chart-box"><h4 id="chDataTitle">📈 30日指数走势</h4><canvas id="chData"></canvas></div>';
  h+='<div style="overflow-x:auto"><table id="dataTbl"><thead><tr><th>日期</th><th>总资产</th><th>现金</th><th>市值</th><th>盈亏</th></tr></thead><tbody></tbody></table></div>';
  $('data').innerHTML=h;

  let tbody='';
  (D.pf.nav_history||[]).slice().reverse().forEach(p=>{tbody+=`<tr><td>${p.date}</td><td>¥${fmt(p.total_assets)}</td><td>¥${fmt(p.cash)}</td><td>¥${fmt(p.market_value)}</td><td style="color:${color(p.pnl)}">¥${fmt(p.pnl)} (${p.pnl_pct>=0?'+':''}${fmt(p.pnl_pct)}%)</td></tr>`});
  $('dataTbl').querySelector('tbody').innerHTML=tbody;

  function drawChart(m){
    let colors={'上证指数':'#ef5350','深证成指':'#58a6ff','创业板指':'#26a69a','科创50':'#f0883e'};
    let ds=[];
    Object.entries(D.ih.indices).forEach(([n,d])=>{
      let pts=m=='daily'?d.daily:d.intraday;
      if(!pts||pts.length<2)return;
      let b=pts[0].price;
      let lbl=m=='daily'?n+'日K':n+'分时';
      ds.push({label:lbl,data:pts.map(p=>({x:m=='daily'?p.date.slice(5):p.time,y:((p.price-b)/b*100)})),borderColor:colors[n]||'#888',borderWidth:1.5,pointRadius:0,tension:.3});
    });
    if(Object.values(charts).length){Object.values(charts).forEach(c=>c.destroy());charts={}}
    if(ds.length)charts.data=new Chart($('chData'),{type:'line',data:{datasets:ds},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:10}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>v.toFixed(1)+'%'}}}}});
    $('chDataTitle').textContent=m=='daily'?'📈 30日指数日K走势':'⏱ 今日指数分时走势';
  }

  document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=function(){
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    drawChart(this.dataset.mode);
  });
  drawChart('daily');
}

// ═══ 复盘 ═══
function renderJournal(){
  let logs=D.al||[];
  if(!Array.isArray(logs)||logs.length==0){
    $('journal').innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text2)"><p style="font-size:48px">📝</p><p>暂无复盘记录</p><p style="font-size:12px;margin-top:8px">盯盘 cron 运行后自动写入</p></div>';
    return;
  }
  let h='';
  logs.forEach(l=>{
    h+=`<div class="alog"><span class="al-sess al-${l.session}">${l.session}</span><span class="al-ts">${l.ts}</span>`;
    if(l.market_summary)h+=`<div class="al-body"><b>📊 盘面:</b> ${l.market_summary}</div>`;
    if(l.signals)h+=`<div class="al-body"><b>🚨 信号:</b> ${l.signals}</div>`;
    if(l.decisions)h+=`<div class="al-body"><b>📋 决策:</b> ${l.decisions}</div>`;
    if(l.reasoning)h+=`<div class="al-body"><b>💡 逻辑:</b> ${l.reasoning}</div>`;
    h+='</div>';
  });
  $('journal').innerHTML=h;
}

// ═══ 资讯 ═══
function renderNews(){
  let nw=D.nw||[];
  if(!Array.isArray(nw)||nw.length==0){
    $('news').innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text2)"><p>暂无资讯 — 数据源接入中</p></div>';
    return;
  }
  let h='';
  nw.forEach(n=>{h+=`<div class="news-item"><div class="nt" onclick="window.open('${n.url}')">${n.title}</div><div class="nm">${n.source} · ${n.ts}</div></div>`});
  $('news').innerHTML=h;
}

// ═══ 启动 ═══
renderOverview();
</script>
