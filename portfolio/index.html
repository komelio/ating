const STOCK_HIST = {"长江电力": [["10:43", 27.07], ["10:43", 27.07], ["10:50", 27.04]], "中国移动": [["10:43", 96.95], ["10:43", 96.95], ["10:50", 97.01]], "贵州茅台": [["10:43", 1361.33], ["10:43", 1361.33], ["10:50", 1361.56]], "海光信息": [["10:43", 341.65], ["10:43", 341.65], ["10:50", 342.02]]};
const PS = [{"date": "2026-05-11", "total_assets": 100000.0, "cash": 100000.0, "market_value": 0.0, "pnl": 0.0, "pnl_pct": 0.0, "holdings_json": "{}"}];
const NEWS = [];
const CASH = 100000.0;
const INVESTED = 0.0;
const TOTAL_ASSETS = PS.length ? PS[0].total_assets : CASH;
const MV = PS.length ? PS[0].market_value : 0;
const PNL = PS.length ? PS[0].pnl : 0;
const PNL_PCT = PS.length ? PS[0].pnl_pct : 0;

let charts = {};
function destroyCharts() { Object.values(charts).forEach(c=>c.destroy()); charts={}; }

function fmt(n,d=2) { return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtB(n) { if(Math.abs(n)>1e8)return (n/1e8).toFixed(2)+'亿'; if(Math.abs(n)>1e4)return (n/1e4).toFixed(2)+'万'; return fmt(n); }
function chg(n) { return n>=0?`<span class="up">+${fmt(n)}%</span>`:`<span class="down">${fmt(n)}%</span>`; }
function chgCls(n) { return n>2?'up':n<-2?'down':''; }
function color(n) { return n>=0?'var(--green)':'var(--red)'; }
function poolTag(p) { return `<span class="pool-tag pool-${p}">${p}</span>`; }

// ═══ Tab切换 ═══
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab:nth-child('+({overview:1,watchlist:2,portfolio:3,data:4,news:5}[name])+')').classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  destroyCharts();
  if(name=='overview') renderOverview();
  if(name=='watchlist') renderWatchlist();
  if(name=='portfolio') renderPortfolio();
  if(name=='data') renderData();
  if(name=='news') renderNews();
}

// ═══ 大盘 ═══
function renderOverview() {
  // 指数条
  let idxHtml = '';
  IDX.forEach(i=>{
    let c = i.change_pct>=0?'up':'down';
    let sign = i.change_pct>=0?'+':'';
    idxHtml += `<div class="idx-card"><div class="name">${i.name}</div><div class="val ${c}">${fmt(i.price)}</div><div class="chg ${c}">${sign}${fmt(i.change_pct)}%</div></div>`;
  });
  document.getElementById('idxBar').innerHTML = idxHtml;

  // 概览卡片
  let up=STOCKS.filter(s=>s.change_pct>0).length, dn=STOCKS.filter(s=>s.change_pct<0).length;
  document.getElementById('overviewCards').innerHTML = `
    <div class="card"><div class="label">总资产</div><div class="value">¥${fmt(TOTAL_ASSETS)}</div><div class="sub">投入 ¥${fmt(INVESTED)}</div></div>
    <div class="card"><div class="label">浮动盈亏</div><div class="value" style="color:${color(PNL)}">¥${fmt(PNL)}</div><div class="sub" style="color:${color(PNL_PCT)}">${PNL_PCT>=0?'+':''}${fmt(PNL_PCT)}%</div></div>
    <div class="card"><div class="label">今日涨跌</div><div class="value"><span class="up">${up}涨</span> <span class="down">${dn}跌</span></div><div class="sub">共${STOCKS.length}只标的</div></div>
    <div class="card"><div class="label">下次定投</div><div class="value">¥15,000</div><div class="sub">每月12日</div></div>
  `;

  // 指数走势图
  let ds = [];
  Object.entries(IDX_HIST).forEach(([name,pts])=>{
    if(pts.length<2) return;
    let base = pts[0][1];
    ds.push({label:name,data:pts.map(p=>({x:p[0],y:((p[1]-base)/base*100)})),borderColor:name=='上证指数'?'#ef5350':name=='深证成指'?'#58a6ff':name=='创业板指'?'#26a69a':'#f0883e',borderWidth:1.5,pointRadius:0,tension:0.3});
  });
  if(ds.length) {
    charts.idx = new Chart(document.getElementById('chartIdx'),{type:'line',data:{datasets:ds},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:8}} ,y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>v.toFixed(1)+'%'}}}}});
  }

  // 净值走势
  if(PS.length>1) {
    let navData = PS.slice().reverse().map(p=>({x:p.date.slice(5),y:p.total_assets}));
    charts.nav = new Chart(document.getElementById('chartNAV'),{type:'line',data:{datasets:[{label:'总资产',data:navData,borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,0.1)',fill:true,borderWidth:2,pointRadius:0,tension:0.3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:8}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>'¥'+(v/10000).toFixed(1)+'万'}}}}});
  }

  // 糖果池核心标的
  let candyKeys = Object.keys(STOCK_HIST).filter(k=>['长江电力','中国移动','贵州茅台'].includes(k));
  if(candyKeys.length) {
    let cds = candyKeys.map(name=>{
      let pts = STOCK_HIST[name];
      if(!pts||pts.length<2) return null;
      let base=pts[0][1];
      return {label:name,data:pts.map(p=>({x:p[0],y:((p[1]-base)/base*100)})),borderWidth:1.5,pointRadius:0,tension:0.3};
    }).filter(Boolean);
    charts.candy = new Chart(document.getElementById('chartCandy'),{type:'line',data:{datasets:cds},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:8}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>v.toFixed(1)+'%'}}}}});
  }

  // 火箭池核心标的
  let rocketKeys = Object.keys(STOCK_HIST).filter(k=>['海光信息'].includes(k));
  if(rocketKeys.length) {
    let rds = rocketKeys.map(name=>{
      let pts = STOCK_HIST[name];
      if(!pts||pts.length<2) return null;
      let base=pts[0][1];
      return {label:name,data:pts.map(p=>({x:p[0],y:((p[1]-base)/base*100)})),borderWidth:1.5,pointRadius:0,tension:0.3};
    }).filter(Boolean);
    charts.rocket = new Chart(document.getElementById('chartRocket'),{type:'line',data:{datasets:rds},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:8}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>v.toFixed(1)+'%'}}}}});
  }
}

// ═══ 自选 ═══
function renderWatchlist() {
  let html = '';
  Object.entries(POOLS).forEach(([pname,pool])=>{
    let emoji = {'糖果池':'💎','火箭池':'🚀','种子池':'🌱'}[pname]||'';
    html += `<div class="pool-section"><div class="pool-header"><h3>${emoji} ${pname}</h3><span class="tag">${(pool.ratio*100).toFixed(0)}% · ${pool.desc}</span></div>`;
    html += `<table><thead><tr><th>标的</th><th>现价</th><th>涨跌</th><th>开盘</th><th>最高</th><th>最低</th><th>昨收</th><th>评分</th><th>逻辑</th></tr></thead><tbody>`;
    pool.stocks.forEach(s=>{
      let sc = s.change_pct>0?'up':s.change_pct<0?'down':'';
      let scCls = s.score>=8?'score-high':s.score>=6?'score-mid':'score-low';
      html += `<tr><td><b>${s.name}</b><br><span style="font-size:10px;color:var(--text2)">${s.code}</span></td><td class="${sc}" style="font-weight:600">${fmt(s.price)}</td><td>${chg(s.change_pct)}</td><td>${fmt(s.open)}</td><td style="color:var(--green)">${fmt(s.high)}</td><td style="color:var(--red)">${fmt(s.low)}</td><td>${fmt(s.prev_close)}</td><td><span class="score ${scCls}">${s.score}/10</span></td><td style="font-size:11px;color:var(--text2);max-width:200px">${s.reason}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  });
  document.getElementById('watchlistContent').innerHTML = html;
}

function renderPortfolio() {
  document.getElementById('portfolioCards').innerHTML = `
    <div class="card"><div class="label">💰 现金</div><div class="value">¥${fmt(CASH)}</div><div class="sub">可用资金</div></div>
    <div class="card"><div class="label">📈 持仓市值</div><div class="value">¥${fmt(MV)}</div><div class="sub">${MV>0?'已建仓':'空仓'}</div></div>
    <div class="card"><div class="label">📊 总资产</div><div class="value">¥${fmt(TOTAL_ASSETS)}</div><div class="sub">投入 ¥${fmt(INVESTED)}</div></div>
    <div class="card"><div class="label">💹 浮动盈亏</div><div class="value" style="color:${color(PNL)}">¥${fmt(PNL)}</div><div class="sub" style="color:${color(PNL_PCT)}">${PNL_PCT>=0?'+':''}${fmt(PNL_PCT)}%</div></div>

  document.getElementById('portfolioHoldings').innerHTML = MV>0

// ═══ 数据 ═══
function renderData() {
  let tbody = '';
  PS.forEach(p=>{
    tbody += `<tr><td>${p.date}</td><td>¥${fmt(p.total_assets)}</td><td>¥${fmt(p.cash)}</td><td>¥${fmt(p.market_value)}</td><td style="color:${color(p.pnl)}">¥${fmt(p.pnl)} (${p.pnl_pct>=0?'+':''}${fmt(p.pnl_pct)}%)</td></tr>`;
  });
  document.querySelector('#dataTable tbody').innerHTML = tbody;

  if(PS.length>1) {
    let navData = PS.slice().reverse().map(p=>({x:p.date.slice(5),y:p.total_assets}));
    charts.hist = new Chart(document.getElementById('chartHistory'),{type:'line',data:{datasets:[{label:'总资产',data:navData,borderColor:'#26a69a',backgroundColor:'rgba(38,166,154,0.15)',fill:true,borderWidth:2,pointRadius:2,tension:0.3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:9}}},y:{ticks:{color:'#8b949e',font:{size:9},callback:v=>'¥'+(v/10000).toFixed(1)+'万'}}}}});
  }
}

// ═══ 资讯 ═══
function renderNews() {
  if(NEWS.length==0) {
    document.getElementById('newsContent').innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--text2)"><p>暂无资讯 — 数据源接入中</p></div>';
    return;
  }
  let html = '';
  NEWS.forEach(n=>{
    html += `<div class="news-item"><div class="ntitle" onclick="window.open('${n.url}')">${n.title}</div><div class="nmeta">${n.source} · ${n.ts} · ${n.summary||''}</div></div>`;
  });
  document.getElementById('newsContent').innerHTML = html;
}

// ═══ 初始渲染 ═══
renderOverview();
</script>
