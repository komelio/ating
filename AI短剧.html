        let currentSlideIndex = 0;

        window.onload = function() {
            initSidebar();
            initMiniProgressDots();
            renderSlide(0);
            
            // Add keyboard event listener
            document.addEventListener('keydown', handleKeyNavigation);

            // Add Swipe gestures detection
            setupTouchGestures();
        }

        // Initialize sidebar menu elements
        function initSidebar() {
            const menu = document.getElementById('sidebarMenu');
            menu.innerHTML = '';
            slideData.forEach((slide, index) => {
                const btn = document.createElement('button');
                btn.id = `sidebar-btn-${index}`;
                btn.onclick = () => { jumpToSlide(index); };
                btn.className = `w-full text-left px-4 py-3.5 rounded-lg text-sm font-semibold transition-all flex items-center space-x-3 mb-1.5 bg-slate-950/20 border border-transparent text-slate-400 hover:text-white hover:bg-slate-800/40`;
                btn.innerHTML = `
                    <span class="w-6 h-6 rounded-md bg-slate-900 border border-slate-800 text-xs font-black flex items-center justify-center text-slate-500 tracking-tight group-hover:border-brand-500">${slide.id}</span>
                    <span class="truncate">${slide.title.replace(/^\d+\.\s*/, '')}</span>
                `;
                menu.appendChild(btn);
            });
        }

        // Initialize footer mini dot indicators
        function initMiniProgressDots() {
            const dotsContainer = document.getElementById('miniDotsProgress');
            dotsContainer.innerHTML = '';
            slideData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.id = `mini-dot-${index}`;
                dot.onclick = () => jumpToSlide(index);
                dot.className = `w-2.5 h-2.5 rounded-full cursor-pointer bg-slate-800 hover:bg-slate-600 transition-all duration-300`;
                dotsContainer.appendChild(dot);
            });
        }

        // Main slide rendering engine
        function renderSlide(index) {
            currentSlideIndex = index;
            const currentSlide = slideData[index];
            const contentContainer = document.getElementById('slideContent');
            
            // Apply Fade-Out Animation
            contentContainer.style.opacity = '0';
            contentContainer.style.transform = 'scale(0.98)';
            
            setTimeout(() => {
                // Load HTML Content
                contentContainer.innerHTML = currentSlide.html;
                
                // Update UI Navigation Items
                updateUINavigation();

                // Run Calculations specifically if the user loads Slide 9 (ROI simulation)
                if(currentSlide.id === 9) {
                    calculateROI();
                }

                // Apply Fade-In Animation
                contentContainer.style.opacity = '1';
                contentContainer.style.transform = 'scale(1)';
            }, 200);
        }

        // Update active classes for progress indicators, sidebar selections
        function updateUINavigation() {
            // Update Text counter
            document.getElementById('slideIndexText').innerText = `${currentSlideIndex + 1} / ${slideData.length}`;
            
            // Update top progress bar width
            const percentage = ((currentSlideIndex + 1) / slideData.length) * 100;
            document.getElementById('topProgressBar').style.width = `${percentage}%`;

            // Sidebar highlight updates
            slideData.forEach((_, index) => {
                const sidebarBtn = document.getElementById(`sidebar-btn-${index}`);
                const dot = document.getElementById(`mini-dot-${index}`);
                
                if (sidebarBtn) {
                    if (index === currentSlideIndex) {
                        sidebarBtn.classList.remove('text-slate-400', 'bg-slate-950/20', 'border-transparent');
                        sidebarBtn.classList.add('text-brand-400', 'bg-slate-900', 'border-slate-800', 'font-black');
                    } else {
                        sidebarBtn.classList.add('text-slate-400', 'bg-slate-950/20', 'border-transparent');
                        sidebarBtn.classList.remove('text-brand-400', 'bg-slate-900', 'border-slate-800', 'font-black');
                    }
                }
                if (dot) {
                    if (index === currentSlideIndex) {
                        dot.classList.add('bg-brand-500', 'w-5');
                        dot.classList.remove('bg-slate-800');
                    } else {
                        dot.classList.remove('bg-brand-500', 'w-5');
                        dot.classList.add('bg-slate-800');
                    }
                }
            });
        }

        // Move to the next slide
        function nextSlide() {
            if (currentSlideIndex < slideData.length - 1) {
                renderSlide(currentSlideIndex + 1);
            } else {
                showToast("您已阅读到本白皮书最后一页");
            }
        }

        // Move to the previous slide
        function prevSlide() {
            if (currentSlideIndex > 0) {
                renderSlide(currentSlideIndex - 1);
            } else {
                showToast("已退回到白皮书第一页");
            }
        }

        // Jump to any specific slide directly
        function jumpToSlide(index) {
            if (index >= 0 && index < slideData.length) {
                renderSlide(index);
                // Collapse sidebar automatically on mobile screens to view slide directly
                if (window.innerWidth < 768) {
                    toggleSidebar();
                }
            }
        }

        // Keyboard accessibility
        function handleKeyNavigation(event) {
            if (event.key === 'ArrowRight' || event.key === 'Space') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            }
        }

        // Mobile touchscreen swipe navigation
        let touchStartX = 0;
        let touchEndX = 0;

        function setupTouchGestures() {
            const slideArea = document.getElementById('slideViewport');
            slideArea.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });
            slideArea.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });
        }

        function handleSwipe() {
            const threshold = 50; // swipe minimum distance in pixels
            if (touchStartX - touchEndX > threshold) {
                nextSlide(); // Swipe Left -> Next
            } else if (touchEndX - touchStartX > threshold) {
                prevSlide(); // Swipe Right -> Prev
            }
        }

        // Collapsible sidebar menu
        function toggleSidebar() {
            const sidebar = document.getElementById('slideSidebar');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
            } else {
                sidebar.classList.add('-translate-x-full');
            }
        }

        // Show customizable screen notifications without using blocking alerts
        function showToast(message) {
            const toast = document.getElementById('systemToast');
            const msg = document.getElementById('systemToastMsg');
            msg.innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
            }, 2500);
        }

        // Dynamic financial modeling simulator logic
        function calculateROI() {
            // Extract inputs from DOM sliders
            const inputDramas = parseInt(document.getElementById('input_dramas').value);
            const inputTraffic = parseInt(document.getElementById('input_traffic').value) * 10000; // in ten-thousands
            const inputConv = parseFloat(document.getElementById('input_conv').value) / 100; // raw decimal percentage
            const inputArpu = parseFloat(document.getElementById('input_arpu').value);

            // Tech expenses model
            const baseAPI = 3000;
            const singleDramaVideoCost = 3000; 
            const calcTechCost = baseAPI + (inputDramas * singleDramaVideoCost);

            // Traffic scale and promotional costs
            const baseAdCost = 5000;
            const scalingAdCost = (inputTraffic / 10000) * 200; 
            const calcAdCost = baseAdCost + scalingAdCost;

            // Monthly revenues projection: traffic impressions * conversion rate * average price
            const calculatedRevenue = Math.round(inputTraffic * 30 * inputConv * inputArpu);
            const calculatedProfit = Math.round(calculatedRevenue - calcTechCost - calcAdCost);

            // Display sliders live values
            document.getElementById('val_dramas').innerText = inputDramas;
            document.getElementById('val_traffic').innerText = inputTraffic / 10000;
            document.getElementById('val_conv').innerText = (inputConv * 100).toFixed(2);
            document.getElementById('val_arpu').innerText = inputArpu.toFixed(1);

            // Print formatted accounting data to interface
            document.getElementById('res_tech_cost').innerText = `¥ ${calcTechCost.toLocaleString()}`;
            document.getElementById('res_ad_cost').innerText = `¥ ${calcAdCost.toLocaleString()}`;
            document.getElementById('res_revenue').innerText = `¥ ${calculatedRevenue.toLocaleString()}`;
            
            const profitLabel = document.getElementById('res_profit');
            profitLabel.innerText = `¥ ${calculatedProfit.toLocaleString()}`;
            
            // Stylize profit depending on if value is negative or positive
            if (calculatedProfit < 0) {
                profitLabel.className = "font-black text-xl md:text-2xl text-red-400";
            } else {
                profitLabel.className = "font-black text-xl md:text-2xl text-brand-500 text-glow";
            }
        }
    </script>
